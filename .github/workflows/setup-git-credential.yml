name: Setup Git Credential for SP
on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  setup:
    runs-on: ubuntu-latest
    environment: test
    env:
      DATABRICKS_HOST: https://dbc-0b85a8d6-66ff.cloud.databricks.com
      DATABRICKS_CLIENT_ID: "d213db9e-8780-4fd5-a205-a1db0b5a86f3"
      DATABRICKS_AUTH_TYPE: github-oidc

    steps:
      - uses: actions/checkout@v4
      - uses: databricks/setup-cli@main

      # 既存のGit credentialを確認（あれば表示）
      - name: List existing git credentials
        run: databricks git-credentials list

      # Git credentialを登録
      - name: Create git credential
        run: |
          databricks git-credentials create \
            --git-provider gitHub \
            --git-username "${{ secrets.DATABRICKS_GIT_USERNAME }}" \
            --personal-access-token "${{ secrets.DATABRICKS_GIT_PAT }}"

      # 登録後に再度確認
      - name: Verify registration
        run: databricks git-credentials list
