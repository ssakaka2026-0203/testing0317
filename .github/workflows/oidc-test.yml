name: Databricks OIDC Connection Test

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

# Node.js 24への対応
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test-connection:
    runs-on: ubuntu-latest
    environment: test
    
    env:
      DATABRICKS_HOST: https://dbc-0b85a8d6-66ff.cloud.databricks.com
      DATABRICKS_CLIENT_ID: "75966015710072"
      DATABRICKS_AUTH_TYPE: github-oidc

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 正しい公式アクション名に修正
      - name: Setup Databricks CLI
        uses: databricks/setup-cli@main

      - name: Check Connection
        run: |
          # 接続テスト：フォルダ一覧が表示されれば成功
          databricks workspace list /Workspace/Repos
