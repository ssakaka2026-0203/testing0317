name: OIDC Deploy Test (Dev)
on: workflow_dispatch

permissions:
  id-token: write
  contents: read

jobs:
  test-oidc:
    runs-on: ubuntu-latest
    environment: test
    env:
      DATABRICKS_AUTH_TYPE: github-oidc
      DATABRICKS_HOST: https://dbc-0b85a8d6-66ff.cloud.databricks.com
      DATABRICKS_CLIENT_ID: d213db9e-8780-4fd5-a205-a1db0b5a86f3

    steps:
      - uses: actions/checkout@v4
      - uses: databricks/setup-cli@main
      - name: Verify OIDC connection
        run: databricks current-user me
