name: Databricks OIDC Deployment Test

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: test
    
    env:
      # 【重要】ブラウザからコピーした正しいURLに書き換えてください
      DATABRICKS_HOST: https://dbc-e04d75a2-cdf2.cloud.databricks.com
      DATABRICKS_CLIENT_ID: "96012af9-817d-4867-a2f0-e4d7da458b3a"
      DATABRICKS_AUTH_TYPE: github-oidc

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Databricks CLI
        uses: databricks/setup-cli@main

      - name: Search Correct Repo Path
        run: |
          # 正しいURLであれば、ここでリポジトリの一覧が表示されます
          databricks repos list
