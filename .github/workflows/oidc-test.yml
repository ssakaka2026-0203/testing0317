name: Databricks OIDC Connection Test

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

# Node.js 24への強制移行（警告対策）
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test-connection:
    runs-on: ubuntu-latest
    environment: test
    
    env:
      DATABRICKS_HOST: https://dbc-0b85a8d6-66ff.cloud.databricks.com
      DATABRICKS_CLIENT_ID: "75966015710072"
      DATABRICKS_AUTH_TYPE: github-oidc

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 修正：手動スクリプトをやめて、公式のインストールアクションを使う
      - name: Setup Databricks CLI
        uses: databricks/setup-databricks-cli@v1

      - name: Check Connection
        run: |
          databricks workspace list /Workspace/Repos
