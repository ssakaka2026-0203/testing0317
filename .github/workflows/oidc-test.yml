name: Databricks OIDC Connection Test

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test-connection:
    runs-on: ubuntu-latest
    environment: test
    
    env:
      DATABRICKS_HOST: https://dbc-0b85a8d6-66ff.cloud.databricks.com
      # 修正：14桁の数字ではなく、UUID（Application ID）を使用します
      DATABRICKS_CLIENT_ID: "96012af9-817d-4867-a2f0-e4d7da458b3a"
      DATABRICKS_AUTH_TYPE: github-oidc

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Databricks CLI
        uses: databricks/setup-cli@main

      - name: Check Connection
        run: |
          databricks workspace list /Workspace/Repos
